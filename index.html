<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Louis Vuitton Authentication</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

.container {
  max-width: 400px;
  padding: 20px;
  border-radius: 20px;
  background: white;
  color: black;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2rem;
      margin: 10px 0;
      color: #00ff88;
    }

    p {
      font-size: 1rem;
      opacity: 0.8;
    }

    .loading {
      font-size: 1rem;
      opacity: 0.6;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>

<body>

<div class="container" id="app">
  <div class="loading">Łączenie z serwerem Louis Vuitton...</div>
</div>

<script>
  setTimeout(() => {
    document.getElementById("app").innerHTML = `
      <img src="https://image.goat.com/transform/v1/attachments/product_template_additional_pictures/images/086/339/843/original/1068449_01.jpg.jpeg?action=crop&width=750" alt="LV Trainers">
      <h1>✔ PRODUKT AUTENTYCZNY</h1>
      <p>Ten produkt został pomyślnie zweryfikowany w systemie Louis Vuitton.</p>
      <p>ID weryfikacji: LV-${Math.floor(Math.random()*999999)}</p>
    `;

    const audio = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");
    audio.play();
  }, 2000);
</script>

</body>
</html>
