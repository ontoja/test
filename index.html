<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LV Authentication Services</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:wght@300;400;500&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: #fdfdfd;
            background-image: url('data:image/svg+xml;base64,CiAgICA8c3ZnIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgogICAgICAgIDxwYXRoIGQ9Ik00MCAyMCBMNDUgMzIgTDU4IDMyIEw0OCA0MCBMNTIgNTIgTDQwIDQ0IEwyOCA1MiBMMzIgNDAgTDIyIDMyIEwzNSAzMiBaIiBmaWxsPSIjZjJmMGVhIiAvPgogICAgICAgIDx0ZXh0IHg9IjQwIiB5PSI2NSIgZm9udC1mYW1pbHk9InNlcmlmIiBmb250LXNpemU9IjciIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNlOGU1ZGUiPkxWPC90ZXh0PgogICAgPC9zdmc+CiAgICA=');
            background-size: 120px 120px;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .mobile-frame {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .header {
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 10px;
            color: #000;
            margin: 0;
            font-weight: 500;
        }

        .status-section {
            padding: 30px 20px;
            text-align: center;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #000;
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .verified-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .product-container {
            width: 100%;
            padding: 0 40px;
            margin-bottom: 30px;
        }

        .product-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .info-content {
            text-align: center;
            padding: 0 35px;
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .desc {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #666;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .data-footer {
            margin-top: auto;
            padding: 40px 20px;
            background: #fafafa;
            border-top: 1px solid #f0f0f0;
            text-align: center;
        }

        .cert-id {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: #999;
            text-transform: uppercase;
        }

        /* Clean White Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .line-loader {
            width: 120px;
            height: 1px;
            background: #eee;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
        }

        .line-loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #000;
            animation: slide 1.5s infinite linear;
        }

        @keyframes slide {
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-family: 'Cinzel', serif; letter-spacing: 8px; font-size: 0.9rem;">LOUIS VUITTON</div>
        <div class="line-loader"></div>
    </div>

    <div class="mobile-frame">
        <div class="header">
            <h1 class="logo">LOUIS VUITTON</h1>
        </div>

        <div class="status-section">
            <div class="verified-badge">Produkt Autentyczny</div>
            
            <div class="product-container">
                <img src="https://image.goat.com/transform/v1/attachments/product_template_additional_pictures/images/086/339/843/original/1068449_01.jpg.jpeg?action=crop&width=750" class="product-img" alt="LV Trainer">
            </div>

            <div class="info-content">
                <h2>CYFROWY PASZPORT</h2>
                <p class="desc">
                    Ten dokument potwierdza pochodzenie produktu z kolekcji Louis Vuitton. 
                    Weryfikacja wykonana poprzez szyfrowany system chipowy.
                </p>
            </div>
        </div>

        <div class="data-footer">
            <div class="cert-id" id="meta"></div>
            <div style="font-size: 0.6rem; color: #bbb; margin-top: 15px; letter-spacing: 2px;">AUTHENTICATION SERVICES PARIS</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const code = 'CERT-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            document.getElementById('meta').innerText = 'ID: ' + code + ' | ' + new Date().toLocaleDateString('pl-PL');

            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 2200);
        };
    </script>
</body>
</html>
