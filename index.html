<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>LEGIT CHECK</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .box {
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      animation: pop 0.8s ease-out forwards;
    }

    p {
      font-size: 1.5rem;
      opacity: 0.7;
      margin-top: 10px;
    }

    .loading {
      font-size: 1.2rem;
      opacity: 0.6;
      animation: blink 1s infinite;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>

<div class="box" id="content">
  <div class="loading">Connecting to LV servers...</div>
</div>

<script>
  setTimeout(() => {
    document.getElementById("content").innerHTML = `
      <h1>✅ LEGIT</h1>
      <p>These are authentic. Trust me bro.</p>
    `;

    // vine boom 💀
    const audio = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");
    audio.play();
  }, 2000);
</script>

</body>
</html>
